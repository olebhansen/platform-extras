# Observability stack — moved out of the GitHub cold-start seed into Forgejo (L3
# user-space; see platform repo docs/architecture.md + retrospective-2026-06.md).
# Admin's ArgoCD reaches this via the workloads-root GitHub->Forgejo bridge.
# Specs are byte-identical to the former gitops/admin/apps/{kube-prometheus-stack,loki}.yaml
# so ArgoCD adopts the already-running resources with no recreation. The SSO/admin
# secrets (grafana-oauth, grafana-admin) still come from secrets-sync on GitHub.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      releaseName: kps
      values: |
        crds:
          enabled: true
        prometheus:
          prometheusSpec:
            retention: 14d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-bulk
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
            # Each cluster's prometheus is scraped centrally via federation/remoteWrite
            # later. For now, just keep local data.
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-bulk
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          enabled: true
          # grafana uses a single RWO PVC, so the default RollingUpdate deadlocks on
          # every upgrade: the new pod can't attach the volume the old pod still holds
          # (Multi-Attach). Recreate tears the old pod down first. iter4 follow-up.
          deploymentStrategy:
            type: Recreate
          # The chart's `init-chown-data` initContainer runs `chown -R 472:472
          # /var/lib/grafana`, which fails on the NFS volume with "Operation not
          # permitted" (it effectively runs non-root under the pod's runAsNonRoot)
          # → Init:CrashLoopBackOff. It's also redundant: democratic-csi's CSIDriver
          # is `fsGroupPolicy: ReadWriteOnceWithFSType`, so kubelet already applies
          # the pod's fsGroup (472) to this RWO/nfs volume. Disable it (iter4 follow-up).
          initChownData:
            enabled: false
          persistence:
            enabled: true
            storageClassName: nfs-bulk
            size: 10Gi
          # Admin password comes from a SOPS-managed Secret (phase 2 / WS2b) — no more
          # blank password. Generated by `task secrets` (keys admin-user/admin-password).
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          # Dex OIDC client secret → env (overrides grafana.ini); from the grafana-oauth
          # SOPS Secret (key client-secret), generated by `task secrets`.
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-oauth
                key: client-secret
          grafana.ini:
            server:
              root_url: https://grafana.admin.eigro.com
            auth:
              # Dex-only. Local admin form is off; re-enable in a crisis with
              # `scripts/breakglass.sh enable grafana` (sets GF_AUTH_DISABLE_LOGIN_FORM=false).
              disable_login_form: true
            "auth.generic_oauth":
              enabled: true
              name: Dex
              client_id: grafana
              scopes: "openid email profile groups"
              auth_url: https://auth.admin.eigro.com/dex/auth
              token_url: https://auth.admin.eigro.com/dex/token
              api_url: https://auth.admin.eigro.com/dex/userinfo
              # Locked to one operator: only $SSO_ADMIN_EMAIL is granted a role
              # (GrafanaAdmin); strict mode denies anyone else who authenticates.
              role_attribute_strict: true
              role_attribute_path: "email == 'github.com.ole@olealeksander.net' && 'GrafanaAdmin' || ''"
              allow_assign_grafana_admin: true
          # Replaced by a Gateway-API HTTPRoute (gitops/admin/manifests/gateway/
          # httproute-grafana.yaml). Cilium's Ingress controller is off, so this
          # Ingress never got an address — disable it.
          ingress:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    # prometheus-node-exporter runs hostNetwork/hostPID + hostPath(/proc,/sys,/) +
    # hostPort 9100, which the cluster-default PodSecurity `baseline` rejects — so the
    # DaemonSet scheduled 0/3 pods, never went healthy, and wedged EVERY kps sync
    # (grafana/etc. updates queued behind the stuck health-wait). Label the namespace
    # privileged (same as democratic-csi) so node-exporter can run. iter4 follow-up.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.20.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: nfs-bulk
            size: 100Gi
        # When deploymentMode=SingleBinary, the SimpleScalable replicas must be
        # zero or the chart's validate.yaml refuses to render.
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        gateway:
          enabled: false
        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.16.6
    helm:
      releaseName: promtail
      values: |
        config:
          clients:
            - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
